<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VitalsAI | Rural Health Suite</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a237e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2966/2966327.png">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00bfa5;
            --primary-dark: #00897b;
            --secondary: #1a237e;
            --emergency: #ff1744;
            --ambulance: #d32f2f; 
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --hub-bg: #1e293b;
        }

        /* 🚨 SOS Emergency Animation */
        @keyframes flash-red {
            0% { background-color: var(--bg); }
            50% { background-color: rgba(255, 23, 68, 0.2); }
            100% { background-color: var(--bg); }
        }
        .emergency-flash { animation: flash-red 0.5s infinite !important; }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        .dashboard {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 280px 1fr 340px; 
            gap: 24px;
            height: 850px;
        }

        @media (max-width: 1100px) {
            .dashboard { grid-template-columns: 1fr; height: auto; }
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .sidebar { gap: 20px; }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .pulse-icon { width: 12px; height: 12px; background: var(--emergency); border-radius: 50%; animation: pulse 1.5s infinite; }

        .workspace { gap: 20px; flex: 1; overflow-y: auto; }
        .section-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 10px; }

        .btn {
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .btn-voice { background: var(--primary); color: white; flex: 1; }
        .btn-ambulance { background: var(--ambulance); color: white; flex: 1; }
        .btn-panic { background: var(--emergency); color: white; font-size: 16px; margin-top: auto; }

        .input-wrapper { background: white; border-radius: 16px; padding: 5px; display: flex; border: 1px solid #e2e8f0; margin: 15px 0; }
        input[type="text"] { flex: 1; border: none; padding: 15px; outline: none; font-size: 15px; background: transparent; }

        .chip { background: #f1f5f9; color: #475569; padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; margin: 4px; display: inline-block; border: 1px solid #e2e8f0; cursor: pointer; }

        .severity-bar { height: 12px; width: 100%; background: #e2e8f0; border-radius: 10px; margin: 20px 0; overflow: hidden; display: none; }
        .severity-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .sev-low { background: #10b981; }
        .sev-medium { background: #f59e0b; }
        .sev-high, .sev-emergency { background: #ef4444; }

        .result-card { background: white; border-radius: 18px; padding: 20px; border-left: 6px solid #cbd5e1; transition: all 0.3s; }
        .result-card.emergency { border-left-color: var(--emergency); background: #fff1f2; }

        #emergency-hub {
            background: var(--hub-bg);
            border-radius: 20px;
            padding: 20px;
            color: white;
            display: none;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hub-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .emergency-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-top: 8px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }

        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        .heart-pulse { font-size: 40px; animation: heartBeat 1s infinite; text-align: center; }
        .loader-container { text-align: center; margin-top: 50px; }
    </style>
</head>
<body id="main-body">

    <div class="dashboard">
        <div class="glass-panel sidebar">
            <div class="logo-area">
                <span class="pulse-icon"></span>
                <h2 style="margin:0; font-weight:800; letter-spacing:-1px;">VitalsAI</h2>
            </div>
            
            <p class="section-title">Select Language</p>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <button onclick="changeLang('en-IN')" class="btn" style="background:white; border:1px solid #e2e8f0; color:#475569;">English</button>
                <button onclick="changeLang('hi-IN')" class="btn" style="background:white; border:1px solid #e2e8f0; color:#475569;">हिन्दी</button>
                <button onclick="changeLang('te-IN')" class="btn" style="background:white; border:1px solid #e2e8f0; color:#475569;">తెలుగు</button>
            </div>

            <button class="btn" style="background:#1e293b; color:white; margin-top:20px;" onclick="enableMotionSensors(event)">
                ♿ Enable SOS Motion
            </button>

            <button class="btn btn-panic" onclick="triggerGlobalEmergency('Manual Trigger')">
                🚨 EMERGENCY SOS
            </button>
        </div>

        <div class="glass-panel workspace">
            <div class="section-title">Diagnostic Input</div>
            
            <div style="display: flex; gap: 15px;">
                <button id="start-btn" class="btn btn-voice">🎤 Voice Consultation</button>
                <button id="scan-btn-main" class="btn btn-ambulance" onclick="window.location.href='tel:108'">🚑 Call Ambulance (108)</button>
            </div>

            <div class="section-title" style="margin-top: 20px;">Quick Add Symptoms</div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px;">
                <button onclick="addIconSymptom('Fever')" class="btn" style="background:white; font-size:24px; padding:15px; width:65px;">🌡️</button>
                <button onclick="addIconSymptom('Pain')" class="btn" style="background:white; font-size:24px; padding:15px; width:65px;">😫</button>
                <button onclick="addIconSymptom('Cough')" class="btn" style="background:white; font-size:24px; padding:15px; width:65px;">😷</button>
                <button onclick="addIconSymptom('Injury')" class="btn" style="background:white; font-size:24px; padding:15px; width:65px;">🩹</button>
            </div>

            <div id="symptoms-chips" style="min-height: 40px; display: flex; flex-wrap: wrap;"></div>

            <div class="input-wrapper">
                <input type="text" id="text-input" placeholder="Enter other symptoms...">
                <button onclick="addTextSymptom()" style="border:none; background:var(--primary); color:white; padding:0 20px; border-radius:12px; margin:5px; font-weight:bold; cursor:pointer;">Add</button>
            </div>

            <button id="analyze-btn" class="btn" style="background:var(--secondary); color:white; margin-top:10px; padding:22px; width:100%;">
                🧠 Start Advanced AI Analysis
            </button>
            
            <button onclick="clearAllData()" style="background:none; border:none; color:#94a3b8; text-decoration:underline; font-size:13px; cursor:pointer; margin-top:10px; align-self: center;">Reset All Consultation Data</button>
        </div>

        <div class="glass-panel analysis-panel">
            <div class="section-title">Medical Insights</div>
            
            <div id="sev-container" class="severity-bar">
                <div id="sev-fill" class="severity-fill"></div>
            </div>

            <div id="result">
                <div style="color: #94a3b8; text-align: center; margin-top: 100px;">
                    <p style="font-size: 40px; margin-bottom: 10px;">📉</p>
                    <p>No active analysis.<br>Complete input to begin.</p>
                </div>
            </div>

            <div id="emergency-hub"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
